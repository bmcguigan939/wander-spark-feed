workflows:
  ios-build:
    name: Travidz iOS
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      vars:
        BUNDLE_ID: "com.travidz.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.travidz.app

    triggering:
      events: []

    scripts:
      - name: Install Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $CM_ENV

      - name: Install dependencies
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile

      - name: Build web bundle
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run build
          if [ -d "dist/client" ]; then
            mv dist dist-ssr
            mv dist-ssr/client dist
            rm -rf dist-ssr
          fi
          test -f dist/index.html || { echo "No dist/index.html after build"; find . -maxdepth 3 -type d; exit 1; }

      - name: Generate iOS project
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          if [ ! -d "ios/App" ]; then
            bunx cap add ios
          fi
          bunx cap sync ios
          test -f ios/App/Podfile || { echo "Podfile missing after cap sync"; ls -la ios/App || true; exit 1; }

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
