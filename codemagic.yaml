workflows:
  ios-build:
    name: Travidz iOS
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      vars:
        BUNDLE_ID: "com.travidz.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.travidz.app

    triggering:
      events: []

    scripts:
      - name: Install Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $CM_ENV

      - name: Install dependencies
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile

      - name: Install Capacitor packages
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun add -d @capacitor/cli
          bun add @capacitor/core @capacitor/ios @capacitor/android

      - name: Build web bundle
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run build

          echo "Preparing Capacitor web assets..."

          if [ -d "dist/client/assets" ]; then
            rm -rf capacitor-dist
            mkdir -p capacitor-dist/assets
            cp -R dist/client/assets/* capacitor-dist/assets/

            MAIN_JS=$(find capacitor-dist/assets -name "index-*.js" -type f | sort | tail -n 1 | sed 's|capacitor-dist/||')
            MAIN_CSS=$(find capacitor-dist/assets -name "*.css" -type f | sed 's|capacitor-dist/||')

            cat > capacitor-dist/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Travidz</title>
          EOF

            for css in $MAIN_CSS; do
              echo "    <link rel=\"stylesheet\" href=\"/$css\" />" >> capacitor-dist/index.html
            done

            cat >> capacitor-dist/index.html <<EOF
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/$MAIN_JS"></script>
            </body>
          </html>
          EOF

            rm -rf dist
            mv capacitor-dist dist
          else
            echo "Could not find dist/client/assets"
            find . -maxdepth 4 -type d
            exit 1
          fi

      - name: Generate iOS project
        script: |
          export PATH="$HOME/.bun/bin:$PATH"

          if [ ! -d "ios" ]; then
            bunx cap add ios
          fi

          bunx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
