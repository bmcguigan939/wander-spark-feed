# Codemagic CI/CD for Travidz native builds
# https://docs.codemagic.io/yaml-quick-start/building-a-react-native-app/
#
# Workflows (both manual-trigger only):
#   - ios-build      → archives a SIGNED IPA for App Store / TestFlight
#                      using Codemagic automatic code signing
#   - android-build  → builds an unsigned AAB (add keystore later)
#
# Prerequisite for ios-build:
#   Codemagic → Teams → Integrations → "Developer Portal" connected to your
#   Apple Developer account (Team L784LR8VY6). Automatic signing then handles
#   certificates + provisioning profiles for bundle id com.travidz.app.

workflows:
  ios-build:
    name: Travidz iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "com.travidz.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.travidz.app
    triggering:
      events: []   # manual trigger only — no auto-build on push
    scripts:
      - name: Install bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $CM_ENV
      - name: Install dependencies
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          "$HOME/.bun/bin/bun" install --frozen-lockfile
      - name: Build web bundle
        script: |
          set -euo pipefail
          export PATH="$HOME/.bun/bin:$PATH"
          # TanStack Start (SSR) outputs to dist/client + dist/server.
          # Capacitor needs a static webDir with an index.html, so we
          # build the SSR bundle (for the web deploy) and ALSO emit a
          # tiny dist/mobile/ shell that the native WebView loads.
          "$HOME/.bun/bin/bun" run build
          mkdir -p dist/mobile
          cat > dist/mobile/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
              <title>Travidz</title>
              <style>
                html,body{margin:0;height:100%;background:#0F172A;color:#fff;
                  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
                .c{display:flex;align-items:center;justify-content:center;height:100%;}
              </style>
              <script>window.location.replace('https://www.travidz.com');</script>
            </head>
            <body><div class="c">Loading Travidz…</div></body>
          </html>
          HTML
          test -f dist/mobile/index.html
          echo "Built dist/client, dist/server, and dist/mobile/index.html"
      - name: Generate iOS project (first run only)
        script: |
          set -euxo pipefail
          export PATH="$HOME/.bun/bin:$PATH"
          test -f dist/mobile/index.html || { echo "webDir dist/mobile/index.html missing — web build failed earlier"; exit 1; }
          bunx --bun cap --version
          if [ ! -f "ios/App/Podfile" ]; then
            rm -rf ios
            bunx --bun cap add ios
            test -f ios/App/Podfile || { echo "cap add ios returned 0 but Podfile was not generated"; ls -laR ios || true; exit 1; }
          fi
          bunx --bun cap sync ios
          ls -la ios/App
      - name: Install CocoaPods
        script: |
          set -euo pipefail
          test -f ios/App/Podfile || { echo "Podfile missing — cap add ios failed earlier"; exit 1; }
          cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    # TODO: enable after adding an App Store Connect API key to Codemagic
    # (Teams → Integrations → App Store Connect). Once enabled, future builds
    # auto-land in TestFlight and you can skip the Transporter step.
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true

  android-build:
    name: Travidz Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      vars:
        PACKAGE_NAME: "com.travidz.app"
      node: 22
      java: 17
      # TODO: add a keystore in Codemagic (Teams → Code signing identities →
      # Android keystores) and reference it here as `travidz_keystore`.
      # android_signing:
      #   - travidz_keystore
    triggering:
      events: []   # manual trigger only
    scripts:
      - name: Install bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $CM_ENV
      - name: Install dependencies
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          "$HOME/.bun/bin/bun" install --frozen-lockfile
      - name: Build web bundle
        script: |
          set -euo pipefail
          export PATH="$HOME/.bun/bin:$PATH"
          "$HOME/.bun/bin/bun" run build
          mkdir -p dist/mobile
          cat > dist/mobile/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
              <title>Travidz</title>
              <style>
                html,body{margin:0;height:100%;background:#0F172A;color:#fff;
                  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
                .c{display:flex;align-items:center;justify-content:center;height:100%;}
              </style>
              <script>window.location.replace('https://www.travidz.com');</script>
            </head>
            <body><div class="c">Loading Travidz…</div></body>
          </html>
          HTML
          test -f dist/mobile/index.html
      - name: Generate Android project (first run only)
        script: |
          set -euxo pipefail
          export PATH="$HOME/.bun/bin:$PATH"
          test -f dist/mobile/index.html || { echo "webDir dist/mobile/index.html missing — web build failed earlier"; exit 1; }
          bunx --bun cap --version
          if [ ! -f "android/build.gradle" ]; then
            rm -rf android
            bunx --bun cap add android
            test -f android/app/build.gradle || { echo "cap add android returned 0 but app/build.gradle was not generated"; ls -laR android || true; exit 1; }
          fi
          bunx --bun cap sync android
          ls -la android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal