workflows:
  ios-build:
    name: Travidz iOS
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      vars:
        BUNDLE_ID: "com.travidz.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.travidz.app

    triggering:
      events: []

    scripts:
      - name: Install Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $CM_ENV

      - name: Install dependencies
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile

      - name: Install Capacitor packages
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun add -d @capacitor/cli
          bun add @capacitor/core @capacitor/ios @capacitor/android

      - name: Build web bundle
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run build

          echo "Preparing Capacitor web assets..."

          if [ -f "dist/client/index.html" ]; then
            rm -rf capacitor-dist
            mkdir capacitor-dist
            cp -R dist/client/* capacitor-dist/
            rm -rf dist
            mv capacitor-dist dist
          elif [ -f "dist/index.html" ]; then
            echo "dist/index.html already exists"
          else
            echo "Could not find index.html for Capacitor"
            find . -name index.html
            exit 1
          fi

      - name: Generate iOS project
        script: |
          export PATH="$HOME/.bun/bin:$PATH"

          if [ ! -d "ios" ]; then
            bunx cap add ios
          fi

          bunx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

  android-build:
    name: Travidz Android
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      vars:
        PACKAGE_NAME: "com.travidz.app"
      node: 22
      java: 17

    triggering:
      events: []

    scripts:
      - name: Install Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $CM_ENV

      - name: Install dependencies
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile

      - name: Install Capacitor packages
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun add -d @capacitor/cli
          bun add @capacitor/core @capacitor/ios @capacitor/android

      - name: Build web bundle
        script: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run build

          echo "Preparing Capacitor web assets..."

          if [ -f "dist/client/index.html" ]; then
            rm -rf capacitor-dist
            mkdir capacitor-dist
            cp -R dist/client/* capacitor-dist/
            rm -rf dist
            mv capacitor-dist dist
          elif [ -f "dist/index.html" ]; then
            echo "dist/index.html already exists"
          else
            echo "Could not find index.html for Capacitor"
            find . -name index.html
            exit 1
          fi

      - name: Generate Android project
        script: |
          export PATH="$HOME/.bun/bin:$PATH"

          if [ ! -d "android" ]; then
            bunx cap add android
          fi

          bunx cap sync android

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
